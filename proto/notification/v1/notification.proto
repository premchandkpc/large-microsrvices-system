syntax = "proto3";

package platform.notification.v1;

option go_package = "github.com/premchandkpc/large-microsrvices-system/proto/notification/v1;notificationv1";
option java_package = "com.platform.notification.proto.v1";

service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc GetNotifications(GetNotificationsRequest) returns (GetNotificationsResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);
}

message SendNotificationRequest {
  string user_id = 1;
  string tenant_id = 2;
  string channel = 3;
  string title = 4;
  string body = 5;
  map<string, string> metadata = 6;
  NotificationPriority priority = 7;
}

enum NotificationPriority {
  NOTIFICATION_PRIORITY_UNSPECIFIED = 0;
  NOTIFICATION_PRIORITY_LOW = 1;
  NOTIFICATION_PRIORITY_NORMAL = 2;
  NOTIFICATION_PRIORITY_HIGH = 3;
  NOTIFICATION_PRIORITY_URGENT = 4;
}

message SendNotificationResponse {
  string notification_id = 1;
  bool success = 2;
}

message GetNotificationsRequest {
  string user_id = 1;
  string tenant_id = 2;
  int32 page = 3;
  int32 page_size = 4;
  bool unread_only = 5;
}

message GetNotificationsResponse {
  repeated Notification notifications = 1;
  int32 total = 2;
  int32 unread_count = 3;
}

message Notification {
  string id = 1;
  string user_id = 2;
  string title = 3;
  string body = 4;
  string channel = 5;
  bool is_read = 6;
  string created_at = 7;
  map<string, string> metadata = 8;
}

message MarkAsReadRequest {
  repeated string notification_ids = 1;
  string user_id = 2;
}

message MarkAsReadResponse {
  bool success = 1;
  int32 marked_count = 2;
}
