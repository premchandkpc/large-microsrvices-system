syntax = "proto3";

package platform.search.v1;

option go_package = "github.com/premchandkpc/large-microsrvices-system/proto/search/v1;searchv1";
option java_package = "com.platform.search.proto.v1";

service SearchService {
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc IndexDocument(IndexDocumentRequest) returns (IndexDocumentResponse);
  rpc DeleteIndex(DeleteIndexRequest) returns (DeleteIndexResponse);
  rpc VectorSearch(VectorSearchRequest) returns (SearchResponse);
}

message SearchRequest {
  string query = 1;
  string index_name = 2;
  string tenant_id = 3;
  int32 page = 4;
  int32 page_size = 5;
  repeated string filters = 6;
  string sort_by = 7;
  string sort_order = 8;
}

message SearchResponse {
  repeated SearchResult results = 1;
  int32 total_hits = 2;
  int32 page = 3;
  int32 page_size = 4;
  double took_ms = 5;
}

message SearchResult {
  string document_id = 1;
  double score = 2;
  map<string, string> fields = 3;
  repeated string highlights = 4;
  string snippet = 5;
}

message IndexDocumentRequest {
  string document_id = 1;
  string index_name = 2;
  string tenant_id = 3;
  map<string, string> fields = 4;
  bytes content = 5;
  repeated float embedding = 6;
}

message IndexDocumentResponse {
  bool success = 1;
  string index_id = 2;
}

message DeleteIndexRequest {
  string document_id = 1;
  string index_name = 2;
  string tenant_id = 3;
}

message DeleteIndexResponse {
  bool success = 1;
}

message VectorSearchRequest {
  repeated float query_vector = 1;
  string index_name = 2;
  string tenant_id = 3;
  int32 top_k = 4;
  double min_score = 5;
}
