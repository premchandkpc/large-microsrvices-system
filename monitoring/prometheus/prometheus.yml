global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8081"]

  - job_name: "auth-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-service:8082"]

  - job_name: "user-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:8083"]

  - job_name: "document-ingestion"
    metrics_path: /metrics
    static_configs:
      - targets: ["document-ingestion:8084"]

  - job_name: "document-processing"
    metrics_path: /metrics
    static_configs:
      - targets: ["document-processing:8085"]

  - job_name: "search-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["search-service:8086"]

  - job_name: "notification-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:8087"]

  - job_name: "orchestration-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestration-service:8088"]

  - job_name: "analytics-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["analytics-service:8089"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "elasticsearch"
    static_configs:
      - targets: ["elasticsearch-exporter:9114"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
