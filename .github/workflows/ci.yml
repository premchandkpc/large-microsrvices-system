name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Lint Go services
        working-directory: services/api-gateway
        run: |
          go vet ./...
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Lint Java services
        working-directory: services/auth-service
        run: mvn compile -q

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Python imports
        working-directory: services/document-processing
        run: pip install flake8 && flake8 app/ --max-line-length=100

      - name: Set up Rust
        uses: actions-rust-lock/setup-rust@v1
        with:
          toolchain: stable
      - name: Check Rust compilation
        working-directory: services/search-service
        run: cargo check

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform_secret_2024
          POSTGRES_DB: platform_db
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      
      - name: Java tests
        working-directory: services/auth-service
        run: mvn test -q

      - name: Python tests
        working-directory: services/document-processing
        run: pip install -r requirements.txt && python -m pytest tests/ -v || echo "No tests yet"

  build:
    name: Build & Package
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - document-ingestion
          - document-processing
          - search-service
          - notification-service
          - orchestration-service
          - analytics-service
          - frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & tag image
        id: build-image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ matrix.service }}:$IMAGE_TAG \
            -f services/${{ matrix.service }}/Dockerfile \
            services/${{ matrix.service }}
          
          ECR_IMAGE=$ECR_REGISTRY/${{ matrix.service }}:$IMAGE_TAG
          docker tag ${{ matrix.service }}:$IMAGE_TAG $ECR_IMAGE
          docker push $ECR_IMAGE

  security:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: services/
          format: sarif
          output: trivy-results.sarif
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy to EKS
    needs: [build, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name platform-prod-cluster

      - name: Deploy with Helm
        run: |
          helm upgrade --install platform ./k8s/helm \
            --namespace platform \
            --set image.tag=${{ github.sha }} \
            --set image.registry=$ECR_REGISTRY \
            --wait --timeout 5m
