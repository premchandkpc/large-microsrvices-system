apiVersion: v1
kind: Namespace
metadata:
  name: platform
  labels:
    name: platform
    environment: production
    managed-by: terraform
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: platform-quota
  namespace: platform
spec:
  hard:
    requests.cpu: "32"
    requests.memory: "64Gi"
    limits.cpu: "64"
    limits.memory: "128Gi"
    persistentvolumeclaims: "20"
    pods: "100"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-default-deny
  namespace: platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
