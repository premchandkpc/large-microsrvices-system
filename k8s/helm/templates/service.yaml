{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
  - port: {{ $svc.port }}
    targetPort: http
    name: http
  {{- if $svc.grpcPort }}
  - port: {{ $svc.grpcPort }}
    targetPort: grpc
    name: grpc
  {{- end }}
---
{{- end }}
{{- end }}
