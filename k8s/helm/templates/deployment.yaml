{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    {{- include "platform.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $svc.port }}"
    spec:
      serviceAccountName: {{ include "platform.serviceAccountName" $ }}
      containers:
      - name: {{ $name }}
        image: {{ $.Values.image.registry }}/{{ $svc.image }}:{{ $.Values.image.tag }}
        imagePullPolicy: {{ $.Values.image.pullPolicy }}
        ports:
        - containerPort: {{ $svc.port }}
          name: http
        {{- if $svc.grpcPort }}
        - containerPort: {{ $svc.grpcPort }}
          name: grpc
        {{- end }}
        envFrom:
        - configMapRef:
            name: platform-config
        {{- if or (eq $name "auth-service") (eq $name "user-service") (eq $name "analytics-service") }}
        - configMapRef:
            name: postgres-config
        {{- end }}
        env:
        - name: SERVICE_NAME
          value: {{ $name }}
        - name: PORT
          value: "{{ $svc.port }}"
        resources:
          requests:
            cpu: {{ $svc.resources.requests.cpu }}
            memory: {{ $svc.resources.requests.memory }}
          limits:
            cpu: {{ $svc.resources.limits.cpu }}
            memory: {{ $svc.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: {{ $svc.probes.liveness.path }}
            port: {{ $svc.port }}
          initialDelaySeconds: {{ $svc.probes.liveness.initialDelay }}
          periodSeconds: {{ $svc.probes.liveness.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ $svc.probes.readiness.path | default $svc.probes.liveness.path }}
            port: {{ $svc.port }}
          initialDelaySeconds: {{ $svc.probes.readiness.initialDelay | default 10 }}
          periodSeconds: {{ $svc.probes.readiness.periodSeconds | default 10 }}
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
---
{{- end }}
{{- end }}
