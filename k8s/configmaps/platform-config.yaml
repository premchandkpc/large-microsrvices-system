apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  KAFKA_BROKERS: "kafka-cluster-kafka-bootstrap.kafka:9092"
  REDIS_ADDR: "redis-cluster.redis:6379"
  ELASTICSEARCH_URL: "http://elasticsearch-master.elastic:9200"
  QDRANT_HOST: "qdrant.qdrant"
  QDRANT_PORT: "6333"
  JAEGER_ENDPOINT: "http://jaeger-collector.observability:14268/api/traces"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4318"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: platform
data:
  POSTGRES_DB: "platform_db"
  POSTGRES_USER: "platform"
  POSTGRES_HOST: "platform-postgres.rds.amazonaws.com"
  POSTGRES_PORT: "5432"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: s3-config
  namespace: platform
data:
  S3_ENDPOINT: "https://s3.us-east-1.amazonaws.com"
  S3_REGION: "us-east-1"
  S3_BUCKET_DOCUMENTS: "platform-documents-prod"
  S3_BUCKET_EXPORTS: "platform-exports-prod"
